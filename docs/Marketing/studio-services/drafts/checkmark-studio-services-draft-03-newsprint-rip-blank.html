<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Draft 03 - Newsprint Rip Blank Template</title>
  <style>
    @page { size: Letter; margin: 0; }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #222;
      color: #111111;
      font-family: Impact, "Arial Black", Arial, Helvetica, sans-serif;
    }
    .page {
      position: relative;
      width: 8.5in;
      height: 11in;
      overflow: hidden;
      isolation: isolate;
      padding: .36in .42in .24in;
      background:
      radial-gradient(circle at 12% 18%, rgba(0,0,0,.28) 0 1px, transparent 2px),
      radial-gradient(circle at 72% 68%, rgba(0,0,0,.22) 0 1px, transparent 2px),
      repeating-linear-gradient(0deg, rgba(0,0,0,.1) 0 1px, transparent 1px 5px),
      repeating-linear-gradient(88deg, rgba(0,0,0,.055) 0 1px, transparent 1px 7px),
      #f2f2ee;
      background-size: 9px 9px, 13px 13px, 100% 9px, 11px 100%, auto;
    }
    .page::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: .42;
      background:
        radial-gradient(ellipse at 18% 32%, rgba(0,0,0,.22) 0 2px, transparent 3px),
        radial-gradient(ellipse at 81% 55%, rgba(0,0,0,.18) 0 2px, transparent 4px),
        repeating-linear-gradient(-1.2deg, transparent 0 30px, rgba(0,0,0,.18) 31px, transparent 37px),
        repeating-linear-gradient(-9deg, transparent 0 54px, rgba(255,255,255,.35) 55px, transparent 59px);
      background-size: 19px 17px, 23px 21px, auto, auto;
      mix-blend-mode: multiply;
      z-index: -1;
    }
    .page::after {
      content: "";
      position: absolute;
      inset: .08in;
      border: .045in solid #111111;
      pointer-events: none;
      box-shadow: inset 0 0 0 .025in #f2f2ee, inset 0 0 0 .04in #111111;
    }
    .edge {
      position: absolute;
      left: -.2in;
      right: -.2in;
      height: .22in;
      background: linear-gradient(#111111, #111111);
      opacity: .95;
    }
    .edge.top { top: .13in; transform: rotate(-1.2deg); }
    .edge.bottom { bottom: .13in; transform: rotate(calc(-1.2deg * -1)); }
    .brand {
      position: relative;
      display: grid;
      grid-template-columns: 1.25in 1fr;
      gap: .18in;
      align-items: center;
      margin: .18in 0 .12in;
      transform: rotate(-1.2deg);
    }
    .logo {
      display: grid;
      place-items: center;
      width: 1.18in;
      height: 1.18in;
      background: #111111;
      border: .035in solid #111111;
      box-shadow: .07in .07in 0 #ffffff;
    }
    .logo img {
      width: .95in;
      height: .95in;
      object-fit: contain;
      filter: contrast(1.3);
    }
    .watermark {
      position: absolute;
      left: 50%;
      top: 57%;
      width: 4.45in;
      height: 4.45in;
      display: grid;
      place-items: center;
      transform: translate(-50%, -50%) rotate(-7deg);
      opacity: .16;
      z-index: 1;
      mix-blend-mode: multiply;
      pointer-events: none;
    }
    .watermark img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: invert(1) contrast(1.8);
    }
    .brand,
    .tags,
    .headline,
    .subhead,
    .grid,
    .contact-row,
    .tearoffs {
      position: relative;
      z-index: 2;
    }
    .brand-copy {
      background: #111111;
      color: #eee8d5;
      padding: .08in .14in;
      box-shadow: .07in .07in 0 #ffffff;
    }
    .brand-copy h2 {
      margin: 0;
      font-size: .35in;
      line-height: .85;
      text-transform: uppercase;
    }
    .brand-copy p {
      margin: .055in 0 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .095in;
      font-weight: 950;
      letter-spacing: .18em;
      text-transform: uppercase;
    }
    .tags {
      display: flex;
      gap: .075in;
      margin: .08in 0 .12in;
      transform: rotate(calc(-1.2deg * -1));
    }
    .tags span {
      display: inline-block;
      padding: .055in .08in;
      background: #ffffff;
      border: .035in solid #111111;
      box-shadow: .04in .04in 0 #111111;
      font-size: .145in;
      text-transform: uppercase;
    }
    .tags span:first-child {
      background: #ffffff;
    }
    .headline {
      width: 7.35in;
      margin: .12in 0 .1in;
      transform: rotate(-1.2deg);
    }
    .word {
      display: inline-block;
      margin: 0 .04in .055in 0;
      padding: .018in .075in .038in;
      background: #111111;
      color: #f2f2ee;
      border: .035in solid #111111;
      box-shadow: .045in .045in 0 #ffffff;
      font-size: .7in;
      line-height: .88;
      text-transform: uppercase;
    }
    .word.light {
      background: #f2f2ee;
      color: #111111;
      box-shadow: .045in .045in 0 #111111;
    }
    .word.skew {
      transform: rotate(1.4deg) skew(-4deg);
    }
    .subhead {
      width: 7.1in;
      margin: .1in 0 .16in;
      padding: .12in .15in;
      background: #111111;
      color: #f2f2ee;
      border-left: .14in solid #ffffff;
      outline: .03in solid #111111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .16in;
      line-height: 1.16;
      font-weight: 950;
      transform: rotate(calc(-1.2deg * -0.5));
    }
    .grid {
      display: grid;
      grid-template-columns: 1.05fr .95fr;
      gap: .18in;
      align-items: start;
    }
    .stack {
      display: grid;
      gap: .09in;
    }
    .service {
      min-height: .86in;
      padding: .1in .12in .095in;
      background: #f2f2ee;
      border: .045in solid #111111;
      box-shadow: .07in .07in 0 #111111;
    }
    .service:nth-child(1) { transform: rotate(-.7deg); }
    .service:nth-child(2) { transform: rotate(.8deg); }
    .service:nth-child(3) { transform: rotate(-1deg); }
    .service .num {
      display: inline-block;
      margin-bottom: .035in;
      padding: .028in .055in;
      background: #111111;
      color: #f2f2ee;
      font-size: .086in;
      text-transform: uppercase;
    }
    .service h3 {
      margin: 0;
      font-size: .285in;
      line-height: .86;
      text-transform: uppercase;
    }
    .service p {
      margin: .05in 0 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .092in;
      line-height: 1.2;
      font-weight: 950;
    }
    .rate {
      position: relative;
      min-height: 1.82in;
      padding: .15in;
      background: #111111;
      color: #f2f2ee;
      border: .045in solid #111111;
      box-shadow: .08in .08in 0 #ffffff;
      transform: rotate(calc(-1.2deg * -1));
      overflow: hidden;
    }
    .rate::before {
      content: "";
      position: absolute;
      inset: -.2in;
      opacity: .22;
      background: repeating-linear-gradient(-38deg, transparent 0 .16in, #ffffff .17in .19in);
    }
    .rate > * { position: relative; }
    .rate .label {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .095in;
      font-weight: 950;
      letter-spacing: .12em;
      text-transform: uppercase;
    }
    .price {
      margin: .03in 0;
      font-size: .66in;
      line-height: .9;
    }
    .regular {
      display: inline-block;
      padding: .045in .07in;
      background: #f2f2ee;
      color: #111111;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .105in;
      font-weight: 950;
      text-transform: uppercase;
    }
    .fit {
      margin-top: .15in;
      padding: .13in;
      background: #ffffff;
      border: .045in solid #111111;
      box-shadow: .07in .07in 0 #111111;
      transform: rotate(-1.2deg);
    }
    .fit h3 {
      margin: 0 0 .075in;
      font-size: .28in;
      line-height: .86;
      text-transform: uppercase;
    }
    .fit ul {
      margin: 0;
      padding: 0;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .05in;
      list-style: none;
    }
    .fit li {
      padding: .038in .052in;
      border: .025in solid #111111;
      background: #f2f2ee;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .088in;
      font-weight: 950;
      text-transform: uppercase;
    }
    .contact-row {
      position: absolute;
      left: .58in;
      right: .58in;
      bottom: 1.16in;
      display: grid;
      grid-template-columns: .92fr 1.08fr;
      gap: .16in;
      align-items: stretch;
    }
    .callout,
    .contact {
      border: .045in solid #111111;
      box-shadow: .07in .07in 0 #111111;
    }
    .callout {
      padding: .13in;
      background: #ffffff;
      transform: rotate(calc(-1.2deg * -1));
    }
    .callout h3 {
      margin: 0;
      font-size: .29in;
      line-height: .86;
      text-transform: uppercase;
    }
    .callout p {
      margin: .08in 0 0;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .096in;
      line-height: 1.18;
      font-weight: 950;
    }
    .contact {
      padding: .13in;
      background: #111111;
      color: #f2f2ee;
      transform: rotate(-1.2deg);
    }
    .contact .label {
      margin: 0;
      font-size: .135in;
      text-transform: uppercase;
    }
    .phone {
      margin: .045in 0 .07in;
      font-size: .32in;
      line-height: .88;
    }
    .address {
      font-family: Arial, Helvetica, sans-serif;
      font-size: .1in;
      line-height: 1.22;
      font-weight: 950;
      text-transform: uppercase;
    }
    .tearoffs {
      position: absolute;
      left: .58in;
      right: .58in;
      bottom: .24in;
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: .045in;
    }
    .tab {
      min-height: .75in;
      padding: .045in .035in;
      background: #f2f2ee;
      border: .035in solid #111111;
      text-align: center;
    }
    .tab:nth-child(odd) { transform: rotate(-1.2deg); }
    .tab:nth-child(even) { transform: rotate(1deg); }
    .tab b {
      display: block;
      font-size: .07in;
      line-height: 1;
      text-transform: uppercase;
    }
    .tab span {
      display: block;
      margin-top: .035in;
      font-family: Arial, Helvetica, sans-serif;
      font-size: .088in;
      line-height: 1.03;
      font-weight: 950;
      writing-mode: vertical-rl;
      transform: rotate(180deg);
      margin-left: auto;
      margin-right: auto;
    }
  
    .blank-word.wide { min-width: 2.1in; }
    .blank-word.medium { min-width: 1.55in; }
    .blank-word.small { min-width: .8in; }
  </style>
</head>
<body>
  <main class="page">
    <div class="edge top"></div>
    <div class="edge bottom"></div>
    <div class="watermark"><img src="../../../../src/assets/checkmark-audio-logo.png" alt=""></div>
    <header class="brand">
      <div class="logo"><img src="../../../../src/assets/checkmark-audio-logo.png" alt=""></div>
      <div class="brand-copy">
        <h2>&nbsp;</h2><p>&nbsp;</p>
      </div>
    </header>
    <div class="tags">
      <span>&nbsp;</span><span>&nbsp;</span><span>&nbsp;</span>
    </div>
    <section class="headline">
      <span class="word blank-word wide">&nbsp;</span>
      <span class="word light blank-word small">&nbsp;</span>
      <span class="word skew blank-word wide">&nbsp;</span>
      <span class="word light blank-word medium">&nbsp;</span>
    </section>
    <p class="subhead">&nbsp;</p>
    <section class="grid">
      <div class="stack">
        <article class="service"><span class="num">&nbsp;</span><h3>&nbsp;</h3><p>&nbsp;</p></article>
        <article class="service"><span class="num">&nbsp;</span><h3>&nbsp;</h3><p>&nbsp;</p></article>
        <article class="service"><span class="num">&nbsp;</span><h3>&nbsp;</h3><p>&nbsp;</p></article>
      </div>
      <div>
        <section class="rate"><p class="label">&nbsp;</p><div class="price">&nbsp;</div><div class="regular">&nbsp;</div></section>
        <section class="fit"><h3>&nbsp;</h3><ul><li>&nbsp;</li><li>&nbsp;</li><li>&nbsp;</li><li>&nbsp;</li><li>&nbsp;</li><li>&nbsp;</li><li>&nbsp;</li><li>&nbsp;</li></ul></section>
      </div>
    </section>
    <section class="contact-row">
      <div class="callout"><h3>&nbsp;</h3><p>&nbsp;</p></div>
      <div class="contact"><p class="label">&nbsp;</p><div class="phone">&nbsp;</div><div class="address">&nbsp;<br>&nbsp;<br>&nbsp;</div></div>
    </section>
    <section class="tearoffs"><div class="tab t1"><b>&nbsp;</b><span>&nbsp;</span></div>
        <div class="tab t2"><b>&nbsp;</b><span>&nbsp;</span></div>
        <div class="tab t3"><b>&nbsp;</b><span>&nbsp;</span></div>
        <div class="tab t4"><b>&nbsp;</b><span>&nbsp;</span></div>
        <div class="tab t5"><b>&nbsp;</b><span>&nbsp;</span></div>
        <div class="tab t6"><b>&nbsp;</b><span>&nbsp;</span></div>
        <div class="tab t7"><b>&nbsp;</b><span>&nbsp;</span></div></section>
  </main>
</body>
</html>
