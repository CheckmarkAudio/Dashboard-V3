<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="Checkmark Workspace" />
    <meta name="theme-color" content="#0b0b10" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Checkmark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/app-icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Checkmark Workspace</title>

    <!--
      Supabase password-recovery detection, FIRST THING after the
      document loads. This runs before the JS bundle is parsed and
      before the supabase-js client is constructed, so it reliably
      catches `type=recovery` in the URL hash before supabase strips
      it. The flag is read synchronously by AuthContext and drives
      the top-level RecoveryGate.

      The earlier approach put this in main.tsx's body — that runs
      AFTER all ES module imports resolve, which is AFTER supabase-js
      has already started processing the URL. An inline head script
      is the only place guaranteed to run before any bundle code.
    -->
    <script>
      (function () {
        try {
          var hash = window.location.hash || ''
          var search = window.location.search || ''
          if (hash.indexOf('type=recovery') !== -1 || search.indexOf('type=recovery') !== -1) {
            window.sessionStorage.setItem('pending_password_recovery', '1')
          }
        } catch (e) { /* private mode: rely on onAuthStateChange fallback */ }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
