<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="application-name" content="Checkmark Workspace" />
    <meta name="theme-color" content="#0b0b10" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Checkmark" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/app-icon-192.png" />
    <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png" />
    <title>Checkmark Workspace</title>

    <!--
      Auth-link detection — runs BEFORE the JS bundle loads so the flag
      is set before supabase-js strips the URL hash.

      Catches two Supabase link types:
        type=recovery  — forgot-password reset link
        type=invite    — new member account setup link (sent by admin)

      Both are handled identically by RecoveryGate ("Set your password").
      The flag is read synchronously by AuthContext on mount.
    -->
    <script>
      (function () {
        try {
          var hash = window.location.hash || ''
          var search = window.location.search || ''
          if (
            hash.indexOf('type=recovery') !== -1 || search.indexOf('type=recovery') !== -1 ||
            hash.indexOf('type=invite')   !== -1 || search.indexOf('type=invite')   !== -1
          ) {
            window.sessionStorage.setItem('pending_password_recovery', '1')
          }
        } catch (e) { /* private mode: rely on onAuthStateChange fallback */ }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="./main.tsx"></script>
  </body>
</html>
