name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Supabase public env vars are inlined here on purpose: the anon
      # key is designed to be exposed in client bundles (security is
      # enforced by RLS, not key secrecy). VITE_DEMO_MODE is intentionally
      # not set so the production build uses the real AuthProvider against
      # the Checkmark Intern Manager project.
      #
      # We use the LEGACY anon JWT (not the modern `sb_publishable_…`
      # format) because supabase-js 2.49 ties JWT-based RLS (`auth.uid()`)
      # to the legacy key shape — switching to publishable keys caused
      # `intern_self` SELECT policies to silently return zero rows and
      # forced rejectAndSignOut on every login.
      - run: |
          VITE_BASE_PATH=/Dashboard-V3/ \
          VITE_SUPABASE_URL=https://ncljfjdcyswoeitsooty.supabase.co \
          VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbGpmamRjeXN3b2VpdHNvb3R5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU2NjE4ODMsImV4cCI6MjA5MTIzNzg4M30.bwQj5llGUCBZiE7cFYUbwu6gOqK6G8cOhzm28sUkoxs \
          npx vite build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
