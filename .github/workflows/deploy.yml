name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # Supabase public env vars are inlined here on purpose: the
      # publishable/anon key is designed to be exposed in client bundles
      # (security is enforced by RLS, not key secrecy). VITE_DEMO_MODE
      # is intentionally not set so the production build uses the real
      # AuthProvider against the Checkmark Intern Manager project.
      - run: |
          VITE_BASE_PATH=/Dashboard-V3/ \
          VITE_SUPABASE_URL=https://ncljfjdcyswoeitsooty.supabase.co \
          VITE_SUPABASE_ANON_KEY=sb_publishable_PjiISv3UpItxg200UOsa8w_JI67vZA6 \
          npx vite build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
